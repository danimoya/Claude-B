name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build only, no publish)'
        required: false
        default: 'false'

permissions:
  contents: write
  packages: write
  id-token: write  # required for npm Trusted Publishing (OIDC)

jobs:
  npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Upgrade npm to a version that supports Trusted Publishing (OIDC).
      # Falls back to NPM_TOKEN if no trusted publisher is configured.
      - name: Upgrade npm CLI
        run: npm install -g npm@latest

      - name: Publish
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if [ -n "${NODE_AUTH_TOKEN}" ]; then
            echo "Publishing with NPM_TOKEN"
            npm publish --access public
          else
            echo "Publishing with Trusted Publishing (OIDC)"
            npm publish --access public --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  docker:
    name: Build & push multi-arch image
    runs-on: ubuntu-latest
    env:
      # When DOCKERHUB_USERNAME is unset the DockerHub login step is skipped
      # and only GHCR receives the image.
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image names
        id: names
        run: |
          echo "ghcr=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          if [ -n "$DOCKERHUB_USERNAME" ]; then
            echo "dockerhub=${DOCKERHUB_USERNAME}/claude-b" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ steps.names.outputs.ghcr }}
            ${{ steps.names.outputs.dockerhub }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event.inputs.dry_run != 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [docker]
    # npm is not in `needs` — docker release should succeed even if npm is not yet set up.
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Install

            ```bash
            # One-line install
            curl -fsSL https://cb.danielmoya.cv | bash

            # Or via npm
            npm i -g claude-b

            # Or via Docker
            docker run -d --env-file .env -v ~/.claude-b:/root/.claude-b \
              ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```
